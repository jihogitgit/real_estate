name: Sync Real Estate Transactions

on:
  schedule:
    # 매월 2일 오전 6시 KST (전월 데이터 확정 후)
    - cron: '0 21 1 * *'
  workflow_dispatch:
    inputs:
      seed_from:
        description: '시작 연월 (YYYYMM). 미입력 시 전월만 수집'
        required: false
        default: ''
      sido_filter:
        description: '시도코드 필터 (쉼표구분, 예: 11,23,41). 미입력 시 전국'
        required: false
        default: ''
      concurrency:
        description: '동시 요청 수 (기본 8, 최대 15)'
        required: false
        default: '8'

concurrency:
  group: sync-transactions
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run seed script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CHEONGAHK_API_KEY: ${{ secrets.CHEONGAHK_API_KEY }}
          SEED_FROM: ${{ github.event.inputs.seed_from }}
          SEED_SIDO: ${{ github.event.inputs.sido_filter }}
          SEED_CONCURRENCY: ${{ github.event.inputs.concurrency || '8' }}
        run: node scripts/seed-transactions.mjs
